name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify_release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies with uv
        run: uv sync

      - name: Check version drift
        run: uv run poe version-check

      - name: Verify tag matches repo version
        shell: bash
        run: |
          version="$(uv run cz version -p)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match repo version $version" >&2
            exit 1
          fi

  publish_python:
    needs: verify_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build Python package
        run: uv build

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_npm:
    needs: verify_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate Node package
        run: npm pack --dry-run

      - name: Publish npm package
        run: npm publish
