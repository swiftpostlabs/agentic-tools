name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_test_lint_typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies with uv
        run: uv sync

      - name: Install Node dependencies with Yarn
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Check AI policy generated files
        run: uv run agentic-tools policy check

      - name: Run tests
        run: uv run poe test
      - name: Run Node tests
        run: yarn test
      - name: Validate Node package
        run: yarn run pack
      - name: Run Node linting
        run: yarn lint
      - name: Run Node typechecking
        run: yarn typecheck
      - name: Run linting
        run: uv run poe lint
      - name: Run typechecking
        run: uv run poe typecheck

      - name: Dependabot auto-merge
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
